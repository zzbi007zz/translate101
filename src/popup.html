<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instant Translate Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1>Instant Translate</h1>

    <form id="settings-form">
      <div class="form-group">
        <label for="api-key">Gemini API Key</label>
        <div class="input-with-toggle">
          <input type="password" id="api-key" placeholder="AIza..." required autocomplete="off">
          <button type="button" id="toggle-key" title="Show/Hide">👁️</button>
        </div>
        <small>Get your key at <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a></small>
      </div>

      <div class="form-group">
        <label for="target-lang">Target Language</label>
        <select id="target-lang">
          <option value="en">English</option>
          <option value="vi">Vietnamese</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="zh">Chinese</option>
        </select>
      </div>

      <div class="button-group">
        <button type="button" id="test-btn" class="btn-secondary">Test Translation</button>
        <button type="submit" id="save-btn" class="btn-primary">Save Settings</button>
      </div>
    </form>

    <div id="status-message" class="status-message"></div>

    <div class="footer">
      <p>Hotkey: <kbd>Ctrl+Shift+E</kbd> (or <kbd>Cmd+Shift+E</kbd> on Mac)</p>
      <small>v0.1.0</small>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
