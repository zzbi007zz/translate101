<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Translate - Promo Tile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .promo-tile {
            width: 440px;
            height: 280px;
            background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        .icon {
            width: 96px;
            height: 96px;
            margin-bottom: 16px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="promo-tile">
        <img src="../../../src/icons/icon128.png" alt="Instant Translate" class="icon">
        <div class="title">Instant Translate</div>
        <div class="subtitle">Translate any text instantly</div>
    </div>
</body>
</html>
