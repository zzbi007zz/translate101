<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshot 2 - Settings Popup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        .screenshot {
            width: 1280px;
            height: 800px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Chrome browser window mockup */
        .browser-window {
            width: 900px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .browser-header {
            height: 40px;
            background: #f3f4f6;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
        }

        .browser-dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-red { background: #ef4444; }
        .dot-yellow { background: #f59e0b; }
        .dot-green { background: #10b981; }

        .browser-content {
            background: white;
            padding: 40px;
            min-height: 500px;
        }

        /* Extension popup */
        .popup-container {
            max-width: 400px;
            margin: 0 auto;
        }

        .popup-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .popup-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            border-radius: 12px;
        }

        .popup-title {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 4px;
        }

        .popup-subtitle {
            font-size: 14px;
            color: #6b7280;
        }

        .form-section {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Monaco', 'Courier New', monospace;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .form-select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-help {
            font-size: 12px;
            color: #6b7280;
            margin-top: 6px;
        }

        .form-help a {
            color: #3b82f6;
            text-decoration: none;
        }

        .form-help a:hover {
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 12px;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .test-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .test-title {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
        }

        .btn-secondary {
            width: 100%;
            padding: 10px 20px;
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 20px 0;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #dcfce7;
            color: #166534;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="screenshot">
        <div class="browser-window">
            <div class="browser-header">
                <div class="browser-dots">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-yellow"></div>
                    <div class="dot dot-green"></div>
                </div>
            </div>

            <div class="browser-content">
                <div class="popup-container">
                    <div class="popup-header">
                        <div class="popup-icon" style="background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; font-weight: bold;">🌍</div>
                        <h1 class="popup-title">Instant Translate</h1>
                        <p class="popup-subtitle">Configure your translation settings</p>
                    </div>

                    <form>
                        <div class="form-section">
                            <label class="form-label">
                                Gemini API Key <span class="status-badge">Required</span>
                            </label>
                            <input
                                type="password"
                                class="form-input"
                                placeholder="AIza••••••••••••••••••••••••••••••••"
                                value="AIzaSyB0123456789abcdefghijklmnopqr"
                            >
                            <div class="form-help">
                                Get your free API key at <a href="#">aistudio.google.com</a>
                            </div>
                        </div>

                        <div class="form-section">
                            <label class="form-label">Target Language</label>
                            <select class="form-select">
                                <option value="en" selected>English</option>
                                <option value="vi">Vietnamese</option>
                                <option value="es">Spanish</option>
                                <option value="fr">French</option>
                                <option value="de">German</option>
                                <option value="ja">Japanese</option>
                                <option value="ko">Korean</option>
                                <option value="zh">Chinese</option>
                            </select>
                            <div class="form-help">
                                Default translation language
                            </div>
                        </div>

                        <button type="submit" class="btn-primary">
                            💾 Save Settings
                        </button>

                        <div class="test-section">
                            <div class="test-title">🧪 Test Translation</div>
                            <button type="button" class="btn-secondary">
                                Test API Connection
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
